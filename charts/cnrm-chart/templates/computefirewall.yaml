{{- if .Values.firewall }}
{{- $allowResourceDeletion := .Values.allowResourceDeletion }}
{{- $projectName := include "cnrm-chart.projectID" . }}
{{- range .Values.firewall }}
{{- if not (or .networkRef .networkRefName .network) }}
{{- fail "cnrm-chart: firewall requires networkRef, networkRefName, or network (Shared VPC)" }}
{{- end }}
{{- if .networkRef }}
{{- if and (not .networkRef.external) (not .networkRef.name) }}
{{- fail "cnrm-chart: firewall.networkRef requires external or name" }}
{{- end }}
{{- end }}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeFirewall
metadata:
  annotations:
    {{- include "cnrm-chart.cnrmAnnotations" (dict "projectName" $projectName "allowResourceDeletion" $allowResourceDeletion) | nindent 4 }}
    {{- include "cnrm-chart.customAnnotations" (dict "annotations" .customAnnotations) | nindent 4 }}
  name: {{ include "cnrm-chart.resourceName" (dict "projectName" $projectName "name" .name) }}
spec:
  resourceID: {{ .resourceID | default .name }}
  {{- if .allow }}
  allow:
    {{- range .allow }}
    - protocol: {{ .protocol }}
      {{- if .ports }}
      ports:
        {{- range .ports }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if .deny }}
  deny:
    {{- range .deny }}
    - protocol: {{ .protocol }}
      {{- if .ports }}
      ports:
        {{- range .ports }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if .description }}
  description: {{ .description | quote }}
  {{- end }}
  {{- if .destinationRanges }}
  destinationRanges:
    {{- range .destinationRanges }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- if .direction }}
  direction: {{ .direction }}
  {{- end }}
  {{- if hasKey . "disabled" }}
  disabled: {{ .disabled }}
  {{- end }}
  {{- if hasKey . "enableLogging" }}
  enableLogging: {{ .enableLogging }}
  {{- end }}
  {{- with .logConfig }}
  logConfig:
    metadata: {{ .metadata }}
  {{- end }}
  {{- if .networkRef }}
  networkRef:
{{ include "cnrm-chart.gcpObjectRef" (dict "projectName" $projectName "ref" .networkRef) | trim | indent 4 }}
  {{- else }}
{{ include "cnrm-chart.networkRef" (dict "context" $ "projectName" $projectName "networkRefName" .networkRefName "sharedVpc" .network) | nindent 2 }}
  {{- end }}
  {{- if hasKey . "priority" }}
  priority: {{ .priority }}
  {{- end }}
  {{- if .sourceRanges }}
  sourceRanges:
    {{- range .sourceRanges }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- if .sourceServiceAccounts }}
  sourceServiceAccounts:
    {{- range .sourceServiceAccounts }}
    -
{{ include "cnrm-chart.gcpObjectRef" (dict "projectName" $projectName "ref" .) | trim | indent 6 }}
    {{- end }}
  {{- end }}
  {{- if .sourceTags }}
  sourceTags:
    {{- range .sourceTags }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- if .targetServiceAccounts }}
  targetServiceAccounts:
    {{- range .targetServiceAccounts }}
    -
{{ include "cnrm-chart.gcpObjectRef" (dict "projectName" $projectName "ref" .) | trim | indent 6 }}
    {{- end }}
  {{- end }}
  {{- if .targetTags }}
  targetTags:
    {{- range .targetTags }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
{{- end -}}
{{- end -}}