{{- if .Values.computeRoute }}
{{- $allowResourceDeletion := .Values.allowResourceDeletion }}
{{- $projectName := include "cnrm-chart.projectID" . }}
{{- range .Values.computeRoute }}
{{- if not .destRange }}
{{- fail "cnrm-chart: computeRoute requires destRange" }}
{{- end }}
{{- if not (or .networkRef .networkRefName .sharedVpc) }}
{{- fail "cnrm-chart: computeRoute requires networkRef, networkRefName, or sharedVpc" }}
{{- end }}
{{- if .networkRef }}
{{- if and (not .networkRef.external) (not .networkRef.name) }}
{{- fail "cnrm-chart: computeRoute.networkRef requires external or name" }}
{{- end }}
{{- end }}
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRoute
metadata:
  annotations:
    {{- include "cnrm-chart.cnrmAnnotations" (dict "projectName" $projectName "allowResourceDeletion" $allowResourceDeletion) | nindent 4 }}
    {{- include "cnrm-chart.customAnnotations" (dict "annotations" .customAnnotations) | nindent 4 }}
  name: {{ include "cnrm-chart.resourceName" (dict "projectName" $projectName "name" .name) }}
spec:
  resourceID: {{ .resourceID | default .name }}
  destRange: {{ .destRange | quote }}
  {{- if .description }}
  description: {{ .description | quote }}
  {{- end }}
  {{- if .networkRef }}
  networkRef:
{{ include "cnrm-chart.gcpObjectRef" (dict "projectName" $projectName "ref" .networkRef) | trim | indent 4 }}
  {{- else }}
{{ include "cnrm-chart.networkRef" (dict "context" $ "projectName" $projectName "networkRefName" .networkRefName "sharedVpc" .sharedVpc) | nindent 2 }}
  {{- end }}
  {{- if hasKey . "priority" }}
  priority: {{ .priority }}
  {{- else }}
  priority: 1000
  {{- end }}
  {{- if .nextHopGateway }}
  nextHopGateway: {{ .nextHopGateway | quote }}
  {{- end }}
  {{- if .nextHopIp }}
  nextHopIp: {{ .nextHopIp | quote }}
  {{- end }}
  {{- if .nextHopILBRef }}
  nextHopILBRef:
{{ include "cnrm-chart.gcpObjectRef" (dict "projectName" $projectName "ref" .nextHopILBRef) | trim | indent 4 }}
  {{- else if .nextHopILBRefName }}
  nextHopILBRef:
    name: {{ include "cnrm-chart.resourceName" (dict "projectName" $projectName "name" .nextHopILBRefName) }}
  {{- end }}
  {{- if .nextHopInstanceRef }}
  nextHopInstanceRef:
{{ include "cnrm-chart.gcpObjectRef" (dict "projectName" $projectName "ref" .nextHopInstanceRef) | trim | indent 4 }}
  {{- else if .nextHopInstanceRefName }}
  nextHopInstanceRef:
    name: {{ include "cnrm-chart.resourceName" (dict "projectName" $projectName "name" .nextHopInstanceRefName) }}
  {{- end }}
  {{- if .nextHopVPNTunnelRef }}
  nextHopVPNTunnelRef:
{{ include "cnrm-chart.gcpObjectRef" (dict "projectName" $projectName "ref" .nextHopVPNTunnelRef) | trim | indent 4 }}
  {{- else if .nextHopVpnTunnelRefName }}
  nextHopVPNTunnelRef:
    name: {{ include "cnrm-chart.resourceName" (dict "projectName" $projectName "name" .nextHopVpnTunnelRefName) }}
  {{- end }}
  {{- with .tags }}
  tags:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
{{- end -}}
{{- end -}}